version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis
    volumes:
      - faiss_data:/app/data/faiss_indices
    networks:
      - resume-intel-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resume_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resume-intel-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - resume-intel-net

volumes:
  postgres_data:
  faiss_data:

networks:
  resume-intel-net:
    driver: bridge
