version: "3.9"

# ── Migration commands ────────────────────────────────────────────────────────
#   Apply pending migrations:
#     docker compose exec backend alembic upgrade head
#   Generate migration from model changes:
#     docker compose exec backend alembic revision --autogenerate -m "description"
#   Roll back one migration:
#     docker compose exec backend alembic downgrade -1
#   Verify models visible to Alembic:
#     docker compose exec backend python -c "from src.db.models import Base; print(list(Base.metadata.tables.keys()))"
# ─────────────────────────────────────────────────────────────────────────────

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - faiss_data:/app/data/faiss_indices
    networks:
      - resume-intel-net

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: resume_intel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - resume-intel-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d resume_intel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - resume-intel-net

volumes:
  postgres_data:
  faiss_data:

networks:
  resume-intel-net:
    driver: bridge
